<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Daily Routine Tracker</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="Daily Routine Tracker - Track your daily routines and habits with ease">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Routine Tracker">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%234f46e5' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>✓</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234f46e5' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>✓</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            position: fixed;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            touch-action: manipulation;
            background-color: #f1f5f9;
        }
        
        #root {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        input[type="text"],
        input[type="time"] {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */

        const { useState, useEffect } = React;

        // --- Icon Components (Inline SVGs for reliable rendering) ---
        const Icons = {
          Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
          Circle: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>,
          Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
          Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
          Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
          X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
          Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
          Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        };

        function App() {
          // --- State Management ---
          const [activeTab, setActiveTab] = useState('today');
          const [routines, setRoutines] = useState(() => {
            try {
              const saved = localStorage.getItem('daily-routines');
              if (saved) return JSON.parse(saved);
            } catch (e) {
              console.error("Failed to load routines from local storage", e);
            }
            return [
              { id: '1', title: 'Morning Workout', startTime: '07:00', endTime: '08:00', completedDates: [] },
              { id: '2', title: 'Deep Work Session', startTime: '09:00', endTime: '12:00', completedDates: [] },
              { id: '3', title: 'Read a Book', startTime: '21:00', endTime: '22:00', completedDates: [] }
            ];
          });

          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingRoutine, setEditingRoutine] = useState(null);
          const [formData, setFormData] = useState({ title: '', startTime: '', endTime: '' });

          // Get current date string (YYYY-MM-DD) for tracking daily completions
          const today = new Date().toLocaleDateString('en-CA'); // 'en-CA' outputs YYYY-MM-DD

          // Save to local storage whenever routines change
          useEffect(() => {
            localStorage.setItem('daily-routines', JSON.stringify(routines));
          }, [routines]);

          // --- Actions ---
          const handleToggleComplete = (id) => {
            setRoutines(routines.map(routine => {
              if (routine.id === id) {
                const isCompletedToday = routine.completedDates.includes(today);
                const newCompletedDates = isCompletedToday
                  ? routine.completedDates.filter(date => date !== today) // Remove today
                  : [...routine.completedDates, today]; // Add today
                return { ...routine, completedDates: newCompletedDates };
              }
              return routine;
            }));
          };

          const handleDelete = (id) => {
            setRoutines(routines.filter(r => r.id !== id));
          };

          const handleOpenModal = (routine = null) => {
            if (routine) {
              setEditingRoutine(routine);
              setFormData({ title: routine.title, startTime: routine.startTime, endTime: routine.endTime });
            } else {
              setEditingRoutine(null);
              setFormData({ title: '', startTime: '08:00', endTime: '09:00' });
            }
            setIsModalOpen(true);
          };

          const handleCloseModal = () => {
            setIsModalOpen(false);
            setEditingRoutine(null);
          };

          const handleSaveRoutine = (e) => {
            e.preventDefault();
            if (!formData.title.trim() || !formData.startTime) return;

            if (editingRoutine) {
              // Update existing
              setRoutines(routines.map(r => 
                r.id === editingRoutine.id 
                  ? { ...r, title: formData.title, startTime: formData.startTime, endTime: formData.endTime }
                  : r
              ));
            } else {
              // Add new
              const newRoutine = {
                id: window.crypto && window.crypto.randomUUID ? window.crypto.randomUUID() : Date.now().toString(),
                title: formData.title,
                startTime: formData.startTime,
                endTime: formData.endTime,
                completedDates: []
              };
              setRoutines([...routines, newRoutine]);
            }
            handleCloseModal();
          };

          // --- Derived State ---
          // Sort routines chronologically by start time
          const sortedRoutines = [...routines].sort((a, b) => a.startTime.localeCompare(b.startTime));
          
          const completedTodayCount = routines.filter(r => r.completedDates.includes(today)).length;
          const totalRoutinesCount = routines.length;
          const progressPercentage = totalRoutinesCount === 0 ? 0 : Math.round((completedTodayCount / totalRoutinesCount) * 100);

          // --- History Data Calculation ---
          const historyData = {};
          routines.forEach(r => {
            r.completedDates.forEach(date => {
              if (date !== today) {
                if (!historyData[date]) historyData[date] = [];
                historyData[date].push(r);
              }
            });
          });
          const sortedHistory = Object.keys(historyData)
            .sort((a, b) => b.localeCompare(a)) // Newest first
            .map(date => ({
              date,
              completedRoutines: historyData[date]
            }));

          // Helper to format 24h time to 12h time for display
          const formatTime = (time24) => {
            if (!time24) return '';
            const [hours, minutes] = time24.split(':');
            const h = parseInt(hours, 10);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const formattedHours = h % 12 || 12;
            return `${formattedHours}:${minutes} ${ampm}`;
          };

          return (
            <div className="fixed inset-0 w-full h-full bg-slate-50 text-slate-800 font-sans sm:flex sm:items-center sm:justify-center sm:py-8 sm:px-4">
              {/* Mobile-optimized container */}
              <div className="w-full h-full sm:max-w-md sm:h-auto sm:rounded-3xl sm:shadow-xl overflow-hidden flex flex-col relative bg-white">
                
                {/* Header Section */}
                <header className="bg-indigo-600 text-white p-6 pb-8 rounded-b-3xl shadow-md z-10 flex-shrink-0">
                  <div className="flex justify-between items-center mb-6">
                    <div>
                      <h1 className="text-2xl font-bold tracking-tight">
                        {activeTab === 'today' ? 'My Routine' : 'History'}
                      </h1>
                      <p className="text-indigo-200 text-sm mt-1">
                        {activeTab === 'today' 
                          ? new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
                          : 'Your past accomplishments'
                        }
                      </p>
                    </div>
                  </div>

                  {/* Progress Section */}
                  {activeTab === 'today' && (
                    <div className="bg-white/10 rounded-2xl p-4 backdrop-blur-sm">
                      <div className="flex justify-between items-end mb-2">
                        <span className="text-sm font-medium text-indigo-50">Daily Progress</span>
                        <span className="text-2xl font-bold">{progressPercentage}%</span>
                      </div>
                      <div className="w-full bg-indigo-900/40 rounded-full h-2.5 mt-2 overflow-hidden">
                        <div 
                          className="bg-green-400 h-2.5 rounded-full transition-all duration-500 ease-out" 
                          style={{ width: `${progressPercentage}%` }}
                        ></div>
                      </div>
                      <p className="text-xs text-indigo-200 mt-2 text-right">
                        {completedTodayCount} of {totalRoutinesCount} completed
                      </p>
                    </div>
                  )}
                </header>

                {/* Main Content Area */}
                <main className="flex-1 overflow-y-auto overscroll-contain p-4 bg-slate-50/50">
                  {activeTab === 'today' ? (
                    sortedRoutines.length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-full text-slate-400 mt-10 pb-20">
                        <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                          <Icons.Clock />
                        </div>
                        <p className="text-lg font-medium text-slate-500">No routines set</p>
                        <p className="text-sm text-slate-400 text-center mt-2 px-6">Tap the + button to add your first daily routine.</p>
                      </div>
                    ) : (
                      <div className="space-y-3 pb-24">
                        {sortedRoutines.map((routine) => {
                          const isCompleted = routine.completedDates.includes(today);
                          
                          return (
                            <div 
                              key={routine.id} 
                              className={`group flex items-center p-4 rounded-2xl border transition-all duration-200 ${
                                isCompleted 
                                  ? 'bg-slate-50 border-slate-200 opacity-75' 
                                  : 'bg-white border-slate-100 shadow-sm hover:shadow-md'
                              }`}
                            >
                              {/* Checkbox */}
                              <button 
                                onClick={() => handleToggleComplete(routine.id)}
                                className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-colors mr-4 active:scale-95 ${
                                  isCompleted ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                }`}
                                aria-label={isCompleted ? "Mark incomplete" : "Mark complete"}
                              >
                                {isCompleted ? <Icons.Check /> : <Icons.Circle />}
                              </button>

                              {/* Routine Details */}
                              <div className={`flex-1 min-w-0 ${isCompleted ? 'line-through text-slate-500' : 'text-slate-800'}`}>
                                <h3 className="font-semibold text-base truncate">{routine.title}</h3>
                                <div className="flex items-center text-xs text-slate-500 mt-1 space-x-1">
                                  <Icons.Clock />
                                  <span>
                                    {formatTime(routine.startTime)} 
                                    {routine.endTime && ` - ${formatTime(routine.endTime)}`}
                                  </span>
                                </div>
                              </div>

                              {/* Actions (Edit/Delete) */}
                              <div className="flex items-center space-x-1 ml-2">
                                <button 
                                  onClick={() => handleOpenModal(routine)}
                                  className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors active:scale-95"
                                  aria-label="Edit routine"
                                >
                                  <Icons.Edit />
                                </button>
                                <button 
                                  onClick={() => handleDelete(routine.id)}
                                  className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors active:scale-95"
                                  aria-label="Delete routine"
                                >
                                  <Icons.Trash />
                                </button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )
                  ) : (
                    /* History Tab Content */
                    <div className="space-y-4 pb-24">
                      {sortedHistory.length === 0 ? (
                        <div className="flex flex-col items-center justify-center h-full text-slate-400 mt-10">
                          <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                            <Icons.Calendar />
                          </div>
                          <p className="text-lg font-medium text-slate-500">No history yet</p>
                          <p className="text-sm text-slate-400 text-center mt-2 px-6">Complete routines to see them appear here.</p>
                        </div>
                      ) : (
                        sortedHistory.map((day) => (
                          <div key={day.date} className="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
                            <div className="flex items-center mb-3">
                              <Icons.Calendar />
                              <h3 className="font-semibold text-slate-800 ml-2">
                                {new Date(day.date).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' })}
                              </h3>
                              <span className="ml-auto bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">
                                {day.completedRoutines.length} Done
                              </span>
                            </div>
                            <ul className="space-y-2 pl-2 border-l-2 border-slate-100 ml-2">
                              {day.completedRoutines.map(routine => (
                                <li key={routine.id} className="text-sm text-slate-600 flex items-center">
                                  <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mr-2"></span>
                                  {routine.title}
                                </li>
                              ))}
                            </ul>
                          </div>
                        ))
                      )}
                    </div>
                  )}
                </main>

                {/* Floating Action Button - Only on Today tab */}
                {activeTab === 'today' && (
                  <button
                    onClick={() => handleOpenModal()}
                    className="absolute bottom-24 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all z-20"
                    aria-label="Add new routine"
                  >
                    <Icons.Plus />
                  </button>
                )}

                {/* Bottom Navigation */}
                <nav className="absolute bottom-0 w-full bg-white border-t border-slate-200 px-6 py-2 flex justify-around items-center z-20 pb-safe" style={{ paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
                  <button 
                    onClick={() => setActiveTab('today')}
                    className={`flex flex-col items-center p-2 rounded-xl transition-colors active:scale-95 ${activeTab === 'today' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}
                  >
                    <Icons.Home />
                    <span className="text-[10px] font-semibold mt-1">Today</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('history')}
                    className={`flex flex-col items-center p-2 rounded-xl transition-colors active:scale-95 ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}
                  >
                    <Icons.Calendar />
                    <span className="text-[10px] font-semibold mt-1">History</span>
                  </button>
                </nav>

                {/* Add/Edit Modal Overlay */}
                {isModalOpen && (
                  <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm sm:p-4 animate-in fade-in duration-200">
                    {/* Modal Content */}
                    <div className="bg-white w-full sm:max-w-sm rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-200 max-h-[90vh] overflow-y-auto">
                      <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl font-bold text-slate-800">
                          {editingRoutine ? 'Edit Routine' : 'New Routine'}
                        </h2>
                        <button 
                          onClick={handleCloseModal}
                          className="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors active:scale-95"
                        >
                          <Icons.X />
                        </button>
                      </div>

                      <form onSubmit={handleSaveRoutine} className="space-y-4">
                        {/* Title Input */}
                        <div>
                          <label htmlFor="title" className="block text-sm font-medium text-slate-700 mb-1">
                            Activity Name
                          </label>
                          <input
                            type="text"
                            id="title"
                            required
                            placeholder="e.g., Morning Jog"
                            className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                            value={formData.title}
                            onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                          />
                        </div>

                        {/* Time Inputs */}
                        <div className="flex space-x-4">
                          <div className="flex-1">
                            <label htmlFor="startTime" className="block text-sm font-medium text-slate-700 mb-1">
                              Start Time
                            </label>
                            <input
                              type="time"
                              id="startTime"
                              required
                              className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                              value={formData.startTime}
                              onChange={(e) => setFormData({ ...formData, startTime: e.target.value })}
                            />
                          </div>
                          <div className="flex-1">
                            <label htmlFor="endTime" className="block text-sm font-medium text-slate-700 mb-1">
                              End Time <span className="text-slate-400 font-normal">(Opt)</span>
                            </label>
                            <input
                              type="time"
                              id="endTime"
                              className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                              value={formData.endTime}
                              onChange={(e) => setFormData({ ...formData, endTime: e.target.value })}
                            />
                          </div>
                        </div>

                        {/* Submit Button */}
                        <button
                          type="submit"
                          className="w-full mt-6 bg-indigo-600 text-white font-semibold py-3.5 rounded-xl hover:bg-indigo-700 active:bg-indigo-800 transition-colors shadow-sm"
                        >
                          {editingRoutine ? 'Save Changes' : 'Add Routine'}
                        </button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
                .then(registration => {
                    console.log('✓ Service Worker registered:', registration);
                })
                .catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
